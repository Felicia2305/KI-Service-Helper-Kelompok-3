name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Hapus folder yang mengandung file binary (PDF/PNG)
          rm -rf "01_Proposal_&_Analisis"
          rm -rf "02_Design_Documents"
          rm -rf ".github" # Folder workflow juga tidak perlu di HF

          # 2. RESET TOTAL RIWAYAT GIT (PENTING!)
          # Ini akan membuat seolah-olah riwayat file binary tidak pernah ada
          rm -rf .git
          git init
          git config user.email "felicia2305@example.com"
          git config user.name "Felicia2305"
          
          # 3. Masukkan semua file sisa (hanya kode) ke dalam commit baru
          git add .
          git commit -m "Deploy clean code to Hugging Face"

          # 4. Paksa kirim (Force Push) ke Hugging Face
          # Kita gunakan -f karena kita telah me-reset riwayatnya
          git push --force https://Felicia2305:$HF_TOKEN@huggingface.co/spaces/Felicia2305/ki-service-helper main